<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration Form</title>
</head>
<body>
    <h1>Patient Registration Form</h1>
    <p>
        Please fill in the following patient details to complete your registration. 
    </p>
<form action="/submit" method="post">
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname" required><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>

        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob" required><br><br>

        <label>Gender:</label><br>
        <input type="radio" id="male" name="gender" value="Male" required>
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="Female" required>
        <label for="female">Female</label><br>
        <label>Services Required:</label><br>
        <input type="services required"><br>
        <input type="checkbox" id="consultation" name="services" value="Consultation">
        <label for="consultation">Consultation</label><br>
        <input type="checkbox" id="laboratory" name="services" value="Laboratory Test">
        <label for="laboratory">Laboratory Test</label><br>
        <input type="checkbox" id="pharmacy" name="services" value="Pharmacy">
        <label for="pharmacy">Pharmacy</label><br><br>
        <label for="county">County of Residence:</label><br>
        <select id="county" name="county" required>
            <option value="">--Select County--</option>
            <option value="Nairobi">Nairobi</option>
            <option value="Kiambu">Kiambu</option>
            <option value="Mombasa">Mombasa</option>
            <option value="Nakuru">Nakuru</option>
            <option value="Kisumu">Kisumu</option>
            <option value="Other">Other</option>
        </select><br><br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
</form>   
</body>
</html>
